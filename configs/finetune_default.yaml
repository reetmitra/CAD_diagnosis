# SC-Net fine-tuning default configuration
# Usage: python train.py --config configs/finetune_default.yaml --pretrained ./checkpoints/pretrain/best_model.pth

pattern: fine_tuning
data_root: ./dataset/train
epochs: 100
lr: 2.0e-5
weight_decay: 1.0e-4
grad_clip: 0.1
warmup_epochs: 5
ema_decay: 0.9995
delta: 1.0
augment: true
amp: true
ema: true
layerwise_lr: true
sc_class_weight: true

# Transformer architecture (match pre-training unless experimenting)
temporal_encoder_layers: 4
temporal_heads: 8
spatial_encoder_layers: 4
spatial_decoder_layers: 4

# Logging and checkpoints
checkpoint_dir: ./checkpoints/finetune
save_every: 5
print_every: 1
log_dir: ./runs
log_every: 10
