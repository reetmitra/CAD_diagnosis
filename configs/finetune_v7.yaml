# SC-Net v7 fine-tuning configuration — Phase 1-3 Improvements
#
# Key changes from finetune_default.yaml:
#   - L_dc warm-up: hold=20, ramp=30 (stabilize before mutual supervision)
#   - Longer training: 200 epochs, patience=50
#   - Balanced sampling + confidence-gated pseudo-labels
#   - Gradient accumulation for larger effective batch size
#   - Focal loss + label smoothing for class imbalance
#   - Soft pseudo-labels for L_dc (KL-diverg instead of hard CE)
#   - Patient-level data splitting
#   - Seed for reproducibility
#   - eos_coef tuned down to encourage more detections
#
# Usage:
#   python train.py --config configs/finetune_v7.yaml --pretrained ./checkpoints_v6/best_model.pth
#   bash scripts/finetune_v7.sh ./checkpoints_v6/best_model.pth

pattern: fine_tuning
data_root: ./dataset/train

# Training schedule
epochs: 200
lr: 3.0e-5
weight_decay: 1.0e-4
grad_clip: 0.1
warmup_epochs: 10

# L_dc warm-up: hold for 20 epochs, then ramp over 30 epochs
dc_warmup_hold: 20
dc_warmup_ramp: 30
delta: 1.0
dc_confidence_threshold: 0.3
soft_dc: true
label_smoothing: 0.1

# Early stopping
patience: 50
min_delta: 0.0

# Class imbalance handling
balanced_sampling: true
sc_class_weight: true
focal_loss: true
focal_gamma: 2.0
eos_coef: 0.15

# Effective batch = 2 * 1 GPU * 4 accum = 8
accumulate_steps: 4

# Training infrastructure
amp: true
ema: true
ema_decay: 0.999
layerwise_lr: true
augment: true
num_workers: 4
seed: 42
patient_split: true
split_seed: 42

# Transformer architecture
temporal_encoder_layers: 4
temporal_heads: 8
spatial_encoder_layers: 4
spatial_decoder_layers: 4

# Logging and checkpoints
checkpoint_dir: ./checkpoints_v7
save_every: 10
print_every: 1
log_dir: ./runs
log_every: 10
